<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">Calc<span>Fácil</span></a>
    <nav class="main-nav" aria-label="Navegación principal">

    <button class="nav-toggle" aria-label="Abrir menú" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
  </div>
</header>

<main>
  
<div class="row-2">
  <div>
    <label>Valor</label>
    <input type="number" id="vol-val" placeholder="1" oninput="convVol()">
  </div>
  <div>
    <label>De</label>
    <select id="vol-from" onchange="convVol()">
      <option value="L">Litros (L)</option>
      <option value="mL">Mililitros (mL)</option>
      <option value="cL">Centilitros (cL)</option>
      <option value="m3">Metros cúbicos (m³)</option>
      <option value="gal">Galones (gal)</option>
      <option value="floz">Onzas líquidas (fl oz)</option>
    </select>
  </div>
</div>

<label>A</label>
<select id="vol-to" onchange="convVol()">
  <option value="mL">Mililitros (mL)</option>
  <option value="cL">Centilitros (cL)</option>
  <option value="L">Litros (L)</option>
  <option value="m3">Metros cúbicos (m³)</option>
  <option value="gal">Galones (gal)</option>
  <option value="floz">Onzas líquidas (fl oz)</option>
</select>

<div class="result-box" id="vol-res">Introduce un valor</div>
