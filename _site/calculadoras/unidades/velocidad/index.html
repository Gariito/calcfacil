<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    "description": "Convierte kilómetros por hora, millas por hora, metros por segundo y nudos al instante.",
    "url": "https://www.calcfacil.com/calculadoras/unidades/velocidad/",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
  }

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">Calc<span>Fácil</span></a>
    <nav class="main-nav" aria-label="Navegación principal">
      <a href="/calculadoras/salud/">🏥 Salud</a>
      <a href="/calculadoras/unidades/">📐 Unidades</a>
      <a href="/calculadoras/dia-a-dia/">🌤 Día a día</a>
      <a href="/calculadoras/finanzas/">💶 Finanzas</a>
    </nav>
    <button class="nav-toggle" aria-label="Abrir menú" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
  </div>
</header>

<main>
  
<div class="row-2">
  <div>
    <label>Valor</label>
    <input type="number" id="vel-val" placeholder="100" oninput="convVel()">
  </div>
  <div>
    <label>De</label>
    <select id="vel-from" onchange="convVel()">
      <option value="kmh">Kilómetros/hora (km/h)</option>
      <option value="ms">Metros/segundo (m/s)</option>
      <option value="mph">Millas/hora (mph)</option>
      <option value="kn">Nudos (kn)</option>
    </select>
  </div>
</div>

<label>A</label>
<select id="vel-to" onchange="convVel()">
  <option value="mph">Millas/hora (mph)</option>
  <option value="ms">Metros/segundo (m/s)</option>
  <option value="kmh">Kilómetros/hora (km/h)</option>
  <option value="kn">Nudos (kn)</option>
</select>

<div class="result-box" id="vel-res">Introduce un valor</div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>© CalcFácil 2024 · Calculadoras gratuitas · Sin anuncios</p>

    </nav>
