<header class="site-header">

<main>
  
<div class="row-2">

    <label>Valor</label>
    <input type="number" id="data-val" placeholder="1" oninput="convData()">

  <div>
    <label>De</label>
    <select id="data-from" onchange="convData()">
      <option value="GB">Gigabytes (GB)</option>
      <option value="MB">Megabytes (MB)</option>
      <option value="KB">Kilobytes (KB)</option>
      <option value="TB">Terabytes (TB)</option>
      <option value="B">Bytes (B)</option>
    </select>
  </div>
</div>

<label>A</label>
<select id="data-to" onchange="convData()">
  <option value="MB">Megabytes (MB)</option>
  <option value="GB">Gigabytes (GB)</option>
  <option value="KB">Kilobytes (KB)</option>
  <option value="TB">Terabytes (TB)</option>
  <option value="B">Bytes (B)</option>
</select>

<div class="result-box" id="data-res">Introduce un valor</div>
