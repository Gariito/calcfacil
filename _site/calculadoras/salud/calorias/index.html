<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de calorías diarias gratis — CalcFácil</title>
  <meta name="description" content="Calcula las calorías que necesitas al día según tu peso, altura, edad y nivel de actividad física. Basado en la fórmula Mifflin-St Jeor.">
  <meta name="keywords" content="calculadora calorias, tmb, tasa metabolica basal, calorias diarias, cuantas calorias necesito">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.calcfacil.com/calculadoras/salud/calorias/">

  <!-- Open Graph -->
  <meta property="og:title" content="Calculadora de calorías diarias gratis — CalcFácil">
  <meta property="og:description" content="Calcula las calorías que necesitas al día según tu peso, altura, edad y nivel de actividad física. Basado en la fórmula Mifflin-St Jeor.">
  <meta property="og:url" content="https://www.calcfacil.com/calculadoras/salud/calorias/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Calculadora de calorías diarias gratis",
    "description": "Calcula las calorías que necesitas al día según tu peso, altura, edad y nivel de actividad física. Basado en la fórmula Mifflin-St Jeor.",
    "url": "https://www.calcfacil.com/calculadoras/salud/calorias/",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">Calc<span>Fácil</span></a>
    <nav class="main-nav" aria-label="Navegación principal">
      <a href="/calculadoras/salud/">🏥 Salud</a>
      <a href="/calculadoras/unidades/">📐 Unidades</a>
      <a href="/calculadoras/dia-a-dia/">🌤 Día a día</a>
      <a href="/calculadoras/finanzas/">💶 Finanzas</a>
    </nav>
    <button class="nav-toggle" aria-label="Abrir menú" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
  </div>
</header>

<main>
  
<div class="row-2">
  <div>
    <label>Peso (kg)</label>
    <input type="number" id="cal-peso" placeholder="70" oninput="calcCal()">
  </div>
  <div>
    <label>Altura (cm)</label>
    <input type="number" id="cal-altura" placeholder="170" oninput="calcCal()">
  </div>
</div>

<div class="row-2">
  <div>
    <label>Edad (años)</label>
    <input type="number" id="cal-edad" placeholder="30" oninput="calcCal()">
  </div>
  <div>
    <label>Sexo</label>
    <select id="cal-sexo" onchange="calcCal()">
      <option value="h">Hombre</option>
      <option value="m">Mujer</option>
    </select>
  </div>
</div>

<label>Nivel de actividad</label>
<select id="cal-act" onchange="calcCal()">
  <option value="1.2">Sedentario (sin ejercicio)</option>
  <option value="1.375">Ligero (1–3 días/semana)</option>
  <option value="1.55">Moderado (3–5 días/semana)</option>
  <option value="1.725">Activo (6–7 días/semana)</option>
  <option value="1.9">Muy activo (ejercicio intenso diario)</option>
</select>

<div class="result-box" id="cal-res">Introduce tus datos</div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>© CalcFácil 2024 · Calculadoras gratuitas · Sin anuncios</p>
    <nav aria-label="Pie de página">
      <a href="/calculadoras/salud/">Salud</a>
      <a href="/calculadoras/unidades/">Unidades</a>
      <a href="/calculadoras/dia-a-dia/">Día a día</a>
      <a href="/calculadoras/finanzas/">Finanzas</a>
    </nav>
  </div>
</footer>

<script src="/js/calculadoras.js"></script>
</body>
</html>
