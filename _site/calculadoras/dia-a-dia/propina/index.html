<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de propina gratis — divide la cuenta fácil — CalcFácil</title>

  <meta name="keywords" content="calculadora propina, dividir cuenta restaurante, propina porcentaje, cuanto dejar de propina">

  <!-- Open Graph -->

  <meta property="og:description" content="Calcula la propina al instante y divide la cuenta entre el número de personas.">

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Calculadora de propina gratis — divide la cuenta fácil",
    "description": "Calcula la propina al instante y divide la cuenta entre el número de personas.",
    "url": "https://www.calcfacil.com/calculadoras/dia-a-dia/propina/",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">Calc<span>Fácil</span></a>
    <nav class="main-nav" aria-label="Navegación principal">
      <a href="/calculadoras/salud/">🏥 Salud</a>
      <a href="/calculadoras/unidades/">📐 Unidades</a>
      <a href="/calculadoras/dia-a-dia/">🌤 Día a día</a>
      <a href="/calculadoras/finanzas/">💶 Finanzas</a>
    </nav>
    <button class="nav-toggle" aria-label="Abrir menú" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
  </div>
</header>

<main>
  
<label>Total de la cuenta (€)</label>
<input type="number" id="prop-total" placeholder="45.00" oninput="calcPropina()">

<label>Propina (%)</label>
<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
  <input type="range" min="0" max="30" value="10" id="prop-pct"
    oninput="document.getElementById('prop-pct-val').textContent=this.value+'%'; calcPropina()"
    style="flex:1;margin-bottom:0">
  <span id="prop-pct-val" style="font-weight:600;min-width:40px;font-size:1.1rem">10%</span>
</div>

<label>Número de personas</label>
<input type="number" id="prop-personas" placeholder="2" value="1" oninput="calcPropina()">

<div class="result-box" id="prop-res">Introduce el importe</div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>© CalcFácil 2024 · Calculadoras gratuitas · Sin anuncios</p>

    </nav>
  </div>
</footer>
