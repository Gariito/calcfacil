<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de divisas gratis — euro, dólar, libra y más — CalcFácil</title>
  <meta name="description" content="Convierte entre euros, dólares, libras, yenes, francos suizos y pesos al instante.">
  <meta name="keywords" content="conversor divisas, euro a dolar, cambio moneda, conversor moneda gratis">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.calcfacil.com/calculadoras/dia-a-dia/divisas/">

  <!-- Open Graph -->
  <meta property="og:title" content="Conversor de divisas gratis — euro, dólar, libra y más — CalcFácil">
  <meta property="og:description" content="Convierte entre euros, dólares, libras, yenes, francos suizos y pesos al instante.">
  <meta property="og:url" content="https://www.calcfacil.com/calculadoras/dia-a-dia/divisas/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Conversor de divisas gratis — euro, dólar, libra y más",
    "description": "Convierte entre euros, dólares, libras, yenes, francos suizos y pesos al instante.",
    "url": "https://www.calcfacil.com/calculadoras/dia-a-dia/divisas/",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">Calc<span>Fácil</span></a>
    <nav class="main-nav" aria-label="Navegación principal">
      <a href="/calculadoras/salud/">🏥 Salud</a>
      <a href="/calculadoras/unidades/">📐 Unidades</a>
      <a href="/calculadoras/dia-a-dia/">🌤 Día a día</a>
      <a href="/calculadoras/finanzas/">💶 Finanzas</a>
    </nav>
    <button class="nav-toggle" aria-label="Abrir menú" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
  </div>
</header>

<main>
  
<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;font-size:0.82rem;color:var(--muted)">
  ⚠️ Tasas aproximadas en base a EUR. Para transacciones reales consulta tu banco.
</div>

<div class="row-2">
  <div>
    <label>Cantidad</label>
    <input type="number" id="mon-val" placeholder="100" oninput="convMoneda()">
  </div>
  <div>
    <label>De</label>
    <select id="mon-from" onchange="convMoneda()">
      <option value="EUR">EUR – Euro</option>
      <option value="USD">USD – Dólar americano</option>
      <option value="GBP">GBP – Libra esterlina</option>
      <option value="JPY">JPY – Yen japonés</option>
      <option value="CHF">CHF – Franco suizo</option>
      <option value="MXN">MXN – Peso mexicano</option>
      <option value="ARS">ARS – Peso argentino</option>
    </select>
  </div>
</div>

<label>A</label>
<select id="mon-to" onchange="convMoneda()">
  <option value="USD">USD – Dólar americano</option>
  <option value="EUR">EUR – Euro</option>
  <option value="GBP">GBP – Libra esterlina</option>
  <option value="JPY">JPY – Yen japonés</option>
  <option value="CHF">CHF – Franco suizo</option>
  <option value="MXN">MXN – Peso mexicano</option>
  <option value="ARS">ARS – Peso argentino</option>
</select>

<div class="result-box" id="mon-res">Introduce un importe</div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>© CalcFácil 2024 · Calculadoras gratuitas · Sin anuncios</p>
    <nav aria-label="Pie de página">
      <a href="/calculadoras/salud/">Salud</a>
      <a href="/calculadoras/unidades/">Unidades</a>
      <a href="/calculadoras/dia-a-dia/">Día a día</a>
      <a href="/calculadoras/finanzas/">Finanzas</a>
    </nav>
  </div>
</footer>

<script src="/js/calculadoras.js"></script>
</body>
</html>
